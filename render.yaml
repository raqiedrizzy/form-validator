services:
  - type: web
    name: survey-validator
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "python flask_direct.py"
    autoDeploy: false
    healthCheckPath: /health
    envVars:
      - key: FORM_1_URL
        sync: false
      - key: FORM_2_URL
        sync: false
      - key: RENDER_DEPLOY_HOOK_URL
        sync: false
